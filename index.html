<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Financeiro CFC 2026</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React e ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- jsPDF para gerar o Relatório PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }

        /* Coluna fixa mobile com fundo sólido herdado */
        .sticky-column {
            position: sticky;
            left: 0;
            z-index: 30;
            background-color: inherit;
            border-right: 2px solid #10b981;
            box-shadow: 4px 0 10px -5px rgba(0,0,0,0.15);
            min-width: 140px;
        }

        /* Cabeçalho dos meses fixo no topo */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 20;
            background-color: #f8fafc !important;
        }

        /* O canto (Membro) fica fixo no topo e na esquerda */
        .sticky-corner {
            position: sticky;
            top: 0;
            left: 0;
            z-index: 40;
            background-color: #f8fafc !important;
            border-right: 2px solid #10b981;
        }

        @media (min-width: 768px) {
            .sticky-column, .sticky-corner { min-width: 240px; }
        }

        .snap-x-container {
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .snap-card {
            scroll-snap-align: center;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased flex flex-col min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBFYA0Wj9xjfUDuH9p9lOC3oNMptlfXe2I",
            authDomain: "controle-financeiro-cfc-2026.firebaseapp.com",
            projectId: "controle-financeiro-cfc-2026",
            storageBucket: "controle-financeiro-cfc-2026.firebasestorage.app",
            messagingSenderId: "959151639980",
            appId: "1:959151639980:web:044c8254dc5e279b797e09"
        };

        const { useState, useMemo, useEffect } = React;

        const months = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
        const monthLabels = ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN', 'JUL', 'AGO', 'SET', 'OUT', 'NOV', 'DEZ'];
        const appId = 'cfc-painel-2026-v1';

        const IconPix = ({ className }) => (
            <svg className={className} viewBox="0 0 24 24" fill="currentColor">
                <path d="M11.51 2.22l-7.3 7.3a2.08 2.08 0 000 2.96l7.3 7.3c.3.3.73.46 1.15.46s.85-.16 1.15-.46l7.3-7.3a2.08 2.08 0 000-2.96l-7.3-7.3a1.64 1.64 0 00-2.3 0zM16 12l-4 4-4-4 4-4 4 4z" />
            </svg>
        );

        function App({ fbAuth, fbDb }) {
            const [user, setUser] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showModal, setShowModal] = useState(false);
            const [pass, setPass] = useState("");
            const [err, setErr] = useState("");
            const [members, setMembers] = useState([]);
            const [expenses, setExpenses] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isSyncing, setIsSyncing] = useState(false);
            const [pixCopied, setPixCopied] = useState(null);

            useEffect(() => {
                if (!fbAuth) { setLoading(false); return; }
                fbAuth.signInAnonymously().catch(() => setLoading(false));
                return fbAuth.onAuthStateChanged(u => {
                    setUser(u);
                    if(!u) setLoading(false);
                });
            }, [fbAuth]);

            useEffect(() => {
                if (!user || !fbDb) return;
                const mRef = fbDb.collection('artifacts').doc(appId).collection('public').doc('data').collection('members');
                const eRef = fbDb.collection('artifacts').doc(appId).collection('public').doc('data').collection('expenses');

                const unsubM = mRef.onSnapshot(snap => {
                    if (!snap.empty) {
                        let data = [];
                        snap.forEach(d => data.push(d.data()));
                        setMembers(data);
                        setIsSyncing(true);
                    }
                    setLoading(false);
                }, () => setLoading(false));

                const unsubE = eRef.onSnapshot(snap => {
                    if (!snap.empty) {
                        let data = [];
                        snap.forEach(d => data.push(d.data()));
                        setExpenses(data);
                    }
                });
                return () => { unsubM(); unsubE(); };
            }, [user, fbDb]);

            const updateMember = async (id, field, val) => {
                const m = members.find(x => x.id === id);
                if (!m) return;
                const up = { ...m, [field]: val };
                setMembers(prev => prev.map(x => x.id === id ? up : x));
                if (fbDb && isSyncing) await fbDb.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').doc(id.toString()).set(up);
            };

            const addMember = async () => {
                const nid = Date.now();
                const nm = { id: nid, nome: "", jan: 0, fev: 0, mar: 0, abr: 0, mai: 0, jun: 0, jul: 0, ago: 0, set: 0, out: 0, nov: 0, dez: 0 };
                setMembers([...members, nm]);
                if (fbDb && isSyncing) await fbDb.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').doc(nid.toString()).set(nm);
            };

            const delMember = async (id) => {
                if (!confirm("Excluir permanentemente?")) return;
                setMembers(members.filter(x => x.id !== id));
                if (fbDb && isSyncing) await fbDb.collection('artifacts').doc(appId).collection('public').doc('data').collection('members').doc(id.toString()).delete();
            };

            const updateExp = async (id, field, val) => {
                const ex = expenses.find(x => x.id === id);
                if (!ex) return;
                const up = { ...ex, [field]: val };
                setExpenses(expenses.map(x => x.id === id ? up : x));
                if (fbDb && isSyncing) await fbDb.collection('artifacts').doc(appId).collection('public').doc('data').collection('expenses').doc(id.toString()).set(up);
            };

            const addExp = async () => {
                const nid = Date.now();
                const ne = { id: nid, desc: "Nova Saída", valor: 0 };
                setExpenses([...expenses, ne]);
                if (fbDb && isSyncing) await fbDb.collection('artifacts').doc(appId).collection('public').doc('data').collection('expenses').doc(nid.toString()).set(ne);
            };

            const delExp = async (id) => {
                if (!confirm("Excluir gasto?")) return;
                setExpenses(expenses.filter(x => x.id !== id));
                if (fbDb && isSyncing) await fbDb.collection('artifacts').doc(appId).collection('public').doc('data').collection('expenses').doc(id.toString()).delete();
            };

            const handleCopyPix = (valor) => {
                const pixKey50 = "00020126580014br.gov.bcb.pix013627b99623-67fa-4742-877f-8a65d9b3be94520400005303986540550.005802BR5923Adonay Kevyn Dos Santos6009Sao Paulo62290525REC69AAE0FCED44167413074563047E2C";
                const pixKey30 = "00020126580014br.gov.bcb.pix013627b99623-67fa-4742-877f-8a65d9b3be94520400005303986540530.005802BR5923Adonay Kevyn Dos Santos6009Sao Paulo62290525REC69CD954C656E76319708796304199E";
                const pixKeyOutros = "27b99623-67fa-4742-877f-8a65d9b3be94";
                
                let pixKey = pixKeyOutros;
                if (valor === 30) pixKey = pixKey30;
                if (valor === 50) pixKey = pixKey50;

                const textArea = document.createElement("textarea");
                textArea.value = pixKey;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setPixCopied(valor);
                    setTimeout(() => setPixCopied(null), 2500);
                } catch (err) {
                    console.error('Falha ao copiar PIX', err);
                }
                document.body.removeChild(textArea);
            };

            const getRowTotal = (member) => months.reduce((sum, month) => sum + (Number(member[month]) || 0), 0);

            const stats = useMemo(() => {
                let tin = 0, count = 0, colabs = 0;
                members.forEach(m => {
                    tin += getRowTotal(m);
                    const isColab = m.nome && m.nome.startsWith('*') && m.nome.endsWith('*');
                    
                    if (m.nome && !isColab) {
                        count++;
                    } else if (isColab) {
                        colabs++;
                    }
                });
                
                let tout = 0;
                let maiorEx = 0;
                expenses.forEach(curr => {
                    const val = Number(curr.valor) || 0;
                    tout += val;
                    if (val > maiorEx) maiorEx = val;
                });
                
                return { in: tin, out: tout, count, colabs, maiorEx };
            }, [members, expenses]);

            const sortedMembers = useMemo(() => {
                return [...members].sort((a, b) => {
                    const nameA = a.nome || "";
                    const nameB = b.nome || "";
                    
                    const isColabA = nameA.startsWith('*') && nameA.endsWith('*');
                    const isColabB = nameB.startsWith('*') && nameB.endsWith('*');

                    if (isColabA && !isColabB) return 1;
                    if (!isColabA && isColabB) return -1;

                    const cleanA = isColabA ? nameA.substring(1, nameA.length - 1) : nameA;
                    const cleanB = isColabB ? nameB.substring(1, nameB.length - 1) : nameB;
                    
                    return cleanA.localeCompare(cleanB, 'pt-BR');
                });
            }, [members]);

            const sortedExpenses = useMemo(() => [...expenses].sort((a, b) => b.id - a.id), [expenses]);
            const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);

            // FUNÇÃO PARA GERAR O PDF
            const generatePDF = () => {
                const { jsPDF } = window.jspdf;
                // Orientação paisagem (landscape) para caberem todos os meses
                const doc = new jsPDF('landscape'); 

                // Título do Relatório
                doc.setFontSize(18);
                doc.setTextColor(16, 185, 129); // Verde Esmeralda
                doc.text("Relatório Financeiro Detalhado - CFC 2026", 14, 22);
                
                // Data da Emissão
                doc.setFontSize(10);
                doc.setTextColor(100);
                doc.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, 14, 28);

                // Resumo do Clube
                doc.setFontSize(12);
                doc.setTextColor(30);
                doc.text(`Valor em Caixa: ${fmt(stats.in - stats.out)}`, 14, 40);
                doc.text(`Total Arrecadado: ${fmt(stats.in)}`, 80, 40);
                doc.text(`Total de Saídas: ${fmt(stats.out)}`, 150, 40);

                // TABELA DE ENTRADAS (MENSALIDADES)
                doc.setFontSize(14);
                doc.setTextColor(16, 185, 129);
                doc.text("Detalhamento de Entradas (Mensalidades)", 14, 55);
                
                const entradasHead = [['Membro', 'JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN', 'JUL', 'AGO', 'SET', 'OUT', 'NOV', 'DEZ', 'TOTAL']];
                const entradasBody = sortedMembers.map(m => {
                    const row = [m.nome.replace(/\*/g, '')]; // Remove os asteriscos na impressão
                    months.forEach(mon => {
                        const val = Number(m[mon]) || 0;
                        row.push(val > 0 ? `R$ ${val}` : '-');
                    });
                    row.push(fmt(getRowTotal(m)));
                    return row;
                });

                doc.autoTable({
                    startY: 60,
                    head: entradasHead,
                    body: entradasBody,
                    theme: 'striped',
                    headStyles: { fillColor: [16, 185, 129] },
                    styles: { fontSize: 8, cellPadding: 2 },
                });

                // TABELA DE SAÍDAS (GASTOS)
                const finalY = doc.lastAutoTable.finalY || 60;
                doc.setFontSize(14);
                doc.setTextColor(239, 68, 68); // Vermelho
                doc.text("Detalhamento de Saídas (Gastos)", 14, finalY + 15);
                
                const saidasBody = sortedExpenses.map(ex => [
                    ex.desc,
                    fmt(ex.valor)
                ]);

                doc.autoTable({
                    startY: finalY + 20,
                    head: [['Descrição da Saída / Gasto', 'Valor Retirado']],
                    body: saidasBody,
                    theme: 'striped',
                    headStyles: { fillColor: [239, 68, 68] },
                    styles: { fontSize: 10 }
                });

                // Comando para salvar o arquivo
                doc.save('Relatorio_Financeiro_CFC_2026.pdf');
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (pass === "Mmaggott#7") {
                    setIsAdmin(true);
                    setShowModal(false);
                    setPass("");
                    setErr("");
                } else {
                    setErr("Chave incorreta.");
                }
            };

            if (loading && members.length === 0) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-emerald-800 text-white">
                    <div className="w-12 h-12 border-4 border-white/20 border-t-white rounded-full animate-spin mb-4"></div>
                    <p className="font-bold uppercase text-[10px] tracking-widest">Sincronizando CFC...</p>
                </div>
            );

            return (
                <div className="flex flex-col min-h-screen">
                    <header className="bg-emerald-700 text-white p-3 md:p-4 shadow-lg sticky top-0 z-[60]">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center space-x-2">
                                <img src="cfc.png" alt="CFC" className="h-10 w-10 md:h-16 md:w-16 rounded-full bg-white p-0.5 shadow-md object-contain" onError={e => e.target.src="https://ui-avatars.com/api/?name=CFC&background=059669&color=fff"} />
                                <div>
                                    <h1 className="text-lg md:text-2xl font-black italic uppercase leading-none">CFC 2026</h1>
                                    <div className="flex items-center space-x-1 mt-0.5">
                                        <div className={`h-2 w-2 rounded-full ${isSyncing ? 'bg-emerald-400 animate-pulse' : 'bg-orange-400'}`}></div>
                                        <span className="text-[8px] font-black uppercase tracking-tighter">{isSyncing ? 'Online' : 'Conectando'}</span>
                                    </div>
                                </div>
                            </div>
                            <button onClick={() => isAdmin ? setIsAdmin(false) : setShowModal(true)} className="bg-emerald-800 p-2 md:px-4 md:py-2 rounded-xl border border-emerald-600 shadow active:scale-95 transition-all">
                                {isAdmin ? <span className="text-[10px] font-black px-1 text-emerald-300">SAIR</span> : <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-2 md:px-4 mt-4 space-y-4 w-full flex-grow">
                        
                        {/* Cards Resumo Carousel */}
                        <div className="flex overflow-x-auto md:grid md:grid-cols-3 gap-3 pb-2 snap-x-container no-scrollbar">
                            <div className="min-w-[85%] md:min-w-0 bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200 snap-card">
                                <p className="text-[10px] text-slate-400 font-black uppercase mb-1 tracking-widest text-center md:text-left">Valor em Caixa</p>
                                <p className={`text-3xl font-black tracking-tighter text-center md:text-left ${stats.in - stats.out >= 0 ? 'text-emerald-600' : 'text-red-500'}`}>{fmt(stats.in - stats.out)}</p>
                            </div>
                            <div className="min-w-[85%] md:min-w-0 bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200 snap-card">
                                <p className="text-[10px] text-slate-400 font-black uppercase mb-1 tracking-widest text-center md:text-left text-blue-500">Total Arrecadado</p>
                                <p className="text-3xl font-black text-blue-600 tracking-tighter text-center md:text-left">{fmt(stats.in)}</p>
                            </div>
                            <div className="min-w-[85%] md:min-w-0 bg-white p-5 rounded-[2rem] shadow-sm border border-slate-200 snap-card">
                                <p className="text-[10px] text-slate-400 font-black uppercase mb-1 tracking-widest text-center md:text-left text-red-400">Total Saídas</p>
                                <p className="text-3xl font-black text-red-500 tracking-tighter text-center md:text-left">{fmt(stats.out)}</p>
                            </div>
                        </div>
                        <div className="md:hidden flex justify-center space-x-1 -mt-2 mb-2">
                             <div className="w-1 h-1 bg-emerald-600 rounded-full"></div>
                             <div className="w-1 h-1 bg-slate-300 rounded-full"></div>
                             <div className="w-
